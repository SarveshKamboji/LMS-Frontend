<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portal - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>CoursePortal</span>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="#" class="nav-link" onclick="showDashboard()">Dashboard</a>
                <a href="#" class="nav-link" onclick="showCourses()">Courses</a>
                <a href="#" class="nav-link" onclick="showMyCourses()">My Courses</a>
                <a href="#" class="nav-link" onclick="showProfile()">Profile</a>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            <button class="nav-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- Loading Spinner -->
        <div class="loader" id="loader"></div>

        <!-- Messages -->
        <div class="message" id="message"></div>

        <!-- Auth Pages -->
        <div id="auth-container">
            <!-- Login Form -->
            <div class="auth-form" id="login-form">
                <div class="auth-card">
                    <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
                    <form id="loginForm">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span class="btn-text">Login</span>
                            <div class="btn-loader"></div>
                        </button>
                        <p class="auth-switch">
                            Don't have an account? <a href="#" onclick="showSignup()">Sign up</a>
                        </p>
                    </form>
                </div>
            </div>

            <!-- Signup Form -->
            <div class="auth-form hidden" id="signup-form">
                <div class="auth-card">
                    <h2><i class="fas fa-user-plus"></i> Create Account</h2>
                    <form id="signupForm">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="signupName" placeholder="Full Name" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="signupEmail" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signupPassword" placeholder="Password (min 8)" required>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span class="btn-text">Sign Up</span>
                            <div class="btn-loader"></div>
                        </button>
                        <p class="auth-switch">
                            Already have an account? <a href="#" onclick="showLogin()">Login</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="page-content hidden">
            <header class="page-header">
                <h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
                <p>Welcome back to your learning journey!</p>
            </header>
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-book"></i>
                    <div>
                        <h3 id="totalCourses">0</h3>
                        <p>Total Courses</p>
                    </div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div>
                        <h3 id="myCoursesCount">0</h3>
                        <p>My Courses</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Courses Page -->
        <div id="courses" class="page-content hidden">
            <header class="page-header">
                <h1><i class="fas fa-book-open"></i> All Courses</h1>
            </header>
            <div class="courses-grid" id="coursesGrid">
                <!-- Courses will be loaded here -->
            </div>
        </div>

        <!-- My Courses Page -->
        <div id="my-courses" class="page-content hidden">
            <header class="page-header">
                <h1><i class="fas fa-heart"></i> My Courses</h1>
            </header>
            <div class="courses-grid" id="myCoursesGrid">
                <!-- My courses will be loaded here -->
            </div>
        </div>

        <!-- Profile Page -->
        <div id="profile" class="page-content hidden">
            <header class="page-header">
                <h1><i class="fas fa-user-circle"></i> Profile</h1>
            </header>
            <div class="profile-container">
                <div class="profile-card">
                    <div class="profile-info">
                        <h3 id="profileName">Loading...</h3>
                        <p id="profileEmail">Loading...</p>
                    </div>
                    <div class="profile-actions">
                        <button class="btn-outline" onclick="editProfile()">Edit Profile</button>
                        <button class="btn-danger" onclick="deleteAccount()">Delete Account</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
